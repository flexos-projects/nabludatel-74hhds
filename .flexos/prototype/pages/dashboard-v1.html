<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nabludatel | Command Dashboard</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/components.css">
</head>
<body>
  <div class="app-shell theme-dark">
    <aside class="sidebar telemetry-panel">
      <div class="brand">
        Nabludatel
        <div class="pulse-indicator"></div>
      </div>
      <div class="metrics-grid" id="telemetry-stats">
        <!-- Rendered via JS -->
      </div>
    </aside>
    <main class="fluid-width feed-container">
      <header class="header" style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
        <h2>Anomaly Feed</h2>
        <div>
          <a href="coverage-v1.html" class="btn-secondary" style="text-decoration: none;">Coverage Matrix</a>
        </div>
      </header>
      <div class="feed" id="anomaly-feed">
        <!-- Rendered via JS -->
      </div>
    </main>
  </div>

  <script>
    fetch('../mock-data.json')
      .then(res => res.json())
      .then(data => {
        // Render stats
        const statsHtml = `
          <div class="stat-block">
            <div class="metric-label">Sections Queued</div>
            <div class="metric-value mono-text">${data.stats.sections_queued}</div>
          </div>
          <div class="stat-block">
            <div class="metric-label">Processed</div>
            <div class="metric-value mono-text">${data.stats.processed}</div>
          </div>
          <div class="stat-block">
            <div class="metric-label">Critical Alerts</div>
            <div class="metric-value mono-text" style="color: var(--color-danger)">${data.stats.critical_alerts}</div>
          </div>
        `;
        document.getElementById('telemetry-stats').innerHTML = statsHtml;

        // Render feed
        const feedHtml = data.anomalies.map(a => `
          <div class="anomaly-card ${a.severity === 'warning' ? 'severity-warning' : ''}" onclick="window.location.href='section-detail-v1.html?id=${a.section_id}'" style="cursor: pointer;">
            <div class="alert-header">
              <span class="mono-text">SEC: ${a.section_id} (${a.settlement})</span>
              <span class="mono-text">@ ${a.timestamp}</span>
            </div>
            <div class="alert-title">${a.category}</div>
            <div class="alert-body">${a.ai_reasoning}</div>
            <div class="transcript-snippet mono-text">
              ${a.trigger_quote}
            </div>
          </div>
        `).join('');
        document.getElementById('anomaly-feed').innerHTML = feedHtml;
      });
  </script>
</body>
</html>
